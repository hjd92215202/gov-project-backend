server:
  port: 8080
  servlet:
    context-path: /api

spring:
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 500MB
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  datasource:
    url: ${GOV_DB_URL:jdbc:mariadb://localhost:13306/gov_db?useUnicode=true&characterEncoding=utf8mb4&connectionCollation=utf8mb4_unicode_ci&serverTimezone=GMT%2B8&useSSL=false&allowPublicKeyRetrieval=true&useInformationSchema=true}
    username: ${GOV_DB_USERNAME:db_user}
    password: ${GOV_DB_PASSWORD:Egov@123}
    driver-class-name: ${GOV_DB_DRIVER_CLASS_NAME:org.mariadb.jdbc.Driver}
    hikari:
      connection-init-sql: SET NAMES utf8mb4 COLLATE utf8mb4_unicode_ci
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

sa-token:
  token-name: Authorization
  timeout: 2592000
  is-concurrent: false
  is-share: false
  token-style: uuid

minio:
  endpoint: ${GOV_MINIO_ENDPOINT:http://127.0.0.1:9000}
  public-endpoint: ${GOV_MINIO_PUBLIC_ENDPOINT:${minio.endpoint}}
  access-key: ${GOV_MINIO_ACCESS_KEY:govadmin}
  secret-key: ${GOV_MINIO_SECRET_KEY:govadminpassword}
  bucket-name: ${GOV_MINIO_BUCKET_NAME:gov-files}

flowable:
  database-schema-update: true
  async-executor-activate: false

logging:
  config: classpath:logback-spring.xml
  file:
    path: ./logs
  level:
    root: INFO
    com.gov.audit: INFO

gov:
  file:
    temp-retain-hours: 24
    temp-cleanup-cron: 0 0 4 * * ?
  security:
    sm4:
      key: ${GOV_SM4_KEY:1234567812345678}
      enabled: ${GOV_SM4_ENABLED:true}
      allow-plaintext-fallback: ${GOV_SM4_ALLOW_PLAINTEXT_FALLBACK:true}
    password:
      pepper: ${GOV_PASSWORD_PEPPER:}
  logging:
    max-history-days: 30
    max-file-size: 20MB
    total-size-cap: 2GB
    slow-request-ms: 800
    cleanup-cron: 0 30 3 * * ?
    audit-retain-days: 180
    frontend-monitor-retain-days: 30
